<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PharmaCare | Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.3/angular-route.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/style/style.css">

  <script src="app.js"></script>
  <script src="services/supabaseConfig.js"></script>
  <script src="services/supabaseService.js"></script>
  <script src="services/medicineService.js"></script>
  <script src="services/categoriesService.js"></script>
  <script src="services/userService.js"></script>
  <script src="controller/MedicinesController.js"></script>
  <script src="controller/MedicineDetailController.js"></script>
  <script src="controller/UsersController.js"></script>
  <script src="controller/UserDetailController.js"></script>
</head>

<body ng-app="myApp" class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#!">
        <i class="bi bi-capsule text-primary me-2"></i>PHARMA<span class="text-primary">CARE</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="#!/medicines">Inventory</a>
          </li>
          <li class="nav-item" ng-if="userRole === 'admin'">
            <a class="nav-link" href="#!/users">Users</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#!/pharmacists">Pharmacists</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#!/admin">Admin</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#!/about">About</a>
          </li>
        </ul>

        <div class="d-flex align-items-center">
          <div ng-if="!isLoggedIn" class="d-flex align-items-center">
            <a href="#!/register" class="nav-link-auth text-decoration-none">Register</a>
            <div class="auth-divider"></div>
            <a href="#!/login" class="nav-link-auth text-decoration-none">Login</a>
          </div>

          <div ng-if="isLoggedIn" class="d-flex align-items-center">
            <span class="text-secondary me-3 small">Role: <b class="text-white">{{userRole | uppercase}}</b></span>
            <button class="btn btn-outline-danger btn-sm" ng-click="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div ng-view></div>
  </main>

  <footer class="footer-custom mt-auto">
    <div class="container">
      <div class="row">
        <div class="col-md-6 text-center text-md-start">
          <h5 class="text-white">PHARMACARE</h5>
          <p class="text-secondary small">Comprehensive Pharmacy Inventory & Management System.</p>
        </div>
        <div class="col-md-6 text-center text-md-end">
          <div class="mb-2">
            <a href="#" class="me-3">Support</a>
            <a href="#" class="me-3">Privacy Policy</a>
            <a href="#">Terms of Use</a>
          </div>
          <p class="small text-secondary">&copy; 2026 PharmaCare. Powered by Supabase.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
