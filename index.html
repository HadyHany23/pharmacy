<!doctype html>
<html lang="en" ng-app="myApp">
  <head>
    <meta charset="UTF-8" />
    <title>PharmaCare | Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/style/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
    <script src="services/supabaseConfig.js"></script>
    <script src="services/supabaseService.js"></script>

    <script src="services/authService.js"></script>
    <script src="services/medicineService.js"></script>
    <script src="services/categoriesService.js"></script>
    <script src="services/profilesService.js"></script>
    <script src="services/userService.js"></script>
    <script src="services/roles.js"></script>
    <script src="services/cartService.js"></script>

    <script src="controller/MainController.js"></script>
    <script src="controller/AuthController.js"></script>
    <script src="controller/MedicinesController.js"></script>
    <script src="controller/MedicineDetailController.js"></script>
    <script src="controller/ProfilesController.js"></script>
    <script src="controller/UsersController.js"></script>
    <script src="controller/UserDetailController.js"></script>
    <script src="controller/CartController.js"></script>
    <script src="controller/CheckoutController.js"></script>
    <script src="controller/HistoryController.js"></script>
  </head>

  <body
    ng-controller="MainController"
    class="d-flex flex-column min-vh-100 bg-light"
  >
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm"
      ng-if="isLoggedIn()"
    >
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <i class="bi bi-capsule me-2"></i> PharmaCare
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="#!/medicines"
                ><i class="bi bi-box-seam"></i> Inventory</a
              >
            </li>

            <li class="nav-item" ng-if="getUserRole() === 'admin'">
              <a class="nav-link text-info" href="#!/profiles"
                ><i class="bi bi-people"></i> Staff Profiles</a
              >
            </li>
            <li class="nav-item" ng-if="getUserRole() === 'admin'">
              <a class="nav-link text-info" href="#!/users"
                ><i class="bi bi-person-gear"></i> User Management</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#!/history"
                ><i class="bi bi-clock-history"></i> Sales History</a
              >
            </li>
          </ul>

          <div class="d-flex align-items-center gap-3">
            <span class="badge bg-secondary text-uppercase py-2 px-3">
              <i class="bi bi-shield-lock"></i> {{getUserRole()}}
            </span>

            <a
              href="#!/cart"
              class="btn btn-outline-success btn-sm d-flex align-items-center"
              ng-if="getUserRole() === 'cashier'"
            >
              <i class="bi bi-cart3 me-1"></i> Cart
            </a>

            <button
              class="btn btn-danger btn-sm d-flex align-items-center"
              ng-click="logout()"
            >
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4 flex-grow-1">
      <div ng-view></div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
      <div class="container">
        <small
          >&copy; 2026 PharmaCare Management System. All Rights Reserved.</small
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
