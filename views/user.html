<div class="container fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">
      <i class="bi bi-people me-2"></i>User Management
    </h2>
    <button
      class="btn btn-primary shadow-sm"
      ng-click="resetForm()"
      data-bs-toggle="modal"
      data-bs-target="#userModal"
    >
      <i class="bi bi-plus-lg me-1"></i> Add User
    </button>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body bg-white rounded">
      <div class="row g-3">
        <div class="col-md-12">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"
              ><i class="bi bi-search"></i
            ></span>
            <input
              type="text"
              class="form-control border-start-0"
              placeholder="Search users by name or email..."
              ng-model="searchQuery"
            />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th class="ps-4">Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th class="text-center pe-4">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white">
          <tr ng-repeat="user in users | filter:searchQuery">
            <td class="ps-4 fw-bold text-secondary">{{ user.name }}</td>
            <td>
              <a href="mailto:{{ user.email }}" class="text-decoration-none">
                {{ user.email }}
              </a>
            </td>
            <td>
              <span ng-if="user.phone">{{ user.phone }}</span>
              <span ng-if="!user.phone" class="text-muted">-</span>
            </td>
            <td>
              <span ng-if="user.phone">{{ user.address }}</span>
              <span ng-if="!user.phone" class="text-muted">-</span>
            </td>
            <td class="text-center pe-4">
              <div class="btn-group gap-2">
                <a
                  href="#!/user-detail/{{user.id}}"
                  class="btn btn-outline-info btn-sm"
                >
                  <i class="bi bi-eye"></i>
                </a>
                <button
                  class="btn btn-outline-warning btn-sm"
                  ng-click="editUser(user)"
                  data-bs-toggle="modal"
                  data-bs-target="#userModal"
                >
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button
                  class="btn btn-outline-danger btn-sm"
                  ng-click="deleteUser(user.id)"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <div ng-if="users.length === 0 && !loading" class="text-center py-5">
        <i class="bi bi-people text-muted" style="font-size: 3rem"></i>
        <h5 class="mt-3 text-muted">No Users Found</h5>
        <p class="text-muted">Start by adding your first user to the system.</p>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">
            {{ isEdit ? 'Edit User' : 'Add New User' }}
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <form
          name="userForm"
          ng-submit="userForm.$valid && saveUser()"
          novalidate
        >
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  ng-model="currentUser.name"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  ng-model="currentUser.email"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Phone Number</label>
                <input
                  type="tel"
                  class="form-control"
                  ng-model="currentUser.phone"
                  placeholder="+1 (555) 123-4567"
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Address</label>
                <input
                  type="text"
                  class="form-control"
                  ng-model="currentUser.address"
                  placeholder="123 Main St, City, State"
                />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary px-4">
              {{ isEdit ? 'Update Changes' : 'Save User' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div ng-if="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-muted">Loading users...</p>
  </div>
</div>
