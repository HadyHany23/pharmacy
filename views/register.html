<div class="row justify-content-center" style="margin-top: 50px">
  <div class="col-md-12 col-lg-6">
    <div class="card shadow border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-success">Staff Registration</h2>
          <p class="text-muted">Create a new account and assign a role</p>
        </div>

        <form name="regForm" ng-submit="handleRegister()" novalidate>
          <div class="mb-3">
            <label class="form-label"
              >Full Name <span class="text-danger">*</span></label
            >
            <input
              type="text"
              name="fullName"
              class="form-control"
              ng-model="regUser.full_name"
              required
              ng-minlength="4"
              maxlength="20"
              placeholder="John Doe"
              ng-class="{'is-invalid': regForm.fullName.$dirty && regForm.fullName.$invalid, 'is-valid': regForm.fullName.$valid}"
            />
            <div class="invalid-feedback">
              Full name must be at least 4 characters.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"
              >Username <span class="text-danger">*</span></label
            >
            <input
              type="text"
              name="username"
              class="form-control"
              ng-model="regUser.username"
              ng-minlength="4"
              maxlength="20"
              required
              placeholder="johndoe123"
              ng-class="{'is-invalid': regForm.username.$dirty && regForm.username.$invalid}"
            />
            <div class="invalid-feedback">
              Username must be at least 4 characters.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"
              >Password <span class="text-danger">*</span></label
            >
            <input
              type="password"
              name="password"
              class="form-control"
              ng-model="regUser.password"
              ng-minlength="8"
              maxlength="12"
              required
              placeholder="Min. 8 characters"
              ng-class="{'is-invalid': regForm.password.$dirty && regForm.password.$invalid}"
            />
            <div class="invalid-feedback">
              Password must be at least 8 characters.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"
              >Confirm Password <span class="text-danger">*</span></label
            >
            <input
              type="password"
              name="confirmPassword"
              class="form-control"
              ng-model="regUser.confirm_password"
              required
              placeholder="Re-enter password"
              ng-class="{'is-invalid': regUser.confirm_password && regUser.password !== regUser.confirm_password}"
            />
            <div
              class="text-danger small"
              ng-show="regUser.confirm_password && regUser.password !== regUser.confirm_password"
            >
              Passwords do not match!
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label"
              >Assign Role <span class="text-danger">*</span></label
            >
            <select
              name="role"
              class="form-select"
              ng-model="regUser.role_id"
              required
              ng-class="{'is-invalid': regForm.role.$dirty && regForm.role.$invalid}"
            >
              <option value="">-- Choose Role --</option>
              <option ng-repeat="r in roles" value="{{r.id}}">
                {{r.name}}
              </option>
            </select>
          </div>

          <button
            class="btn btn-success w-100 py-2 mb-3"
            type="submit"
            ng-disabled="regForm.$invalid || regUser.password !== regUser.confirm_password || loading"
          >
            <i class="glyphicon glyphicon-user" style="margin-right: 8px"></i>
            {{ loading ? 'Processing...' : 'Create Staff Account' }}
          </button>

          <div class="text-center">
            Already have an account? <a href="#!/login">Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
