<div class="container fade-in">
  <h2 class="text-center fw-bold">
    <i class="bi bi-cart-check me-2"></i>Final Checkout
  </h2>
  <hr />

  <div class="row">
    <div class="col-md-6">
      <div class="card shadow-sm border-primary">
        <div class="card-header bg-primary text-white fw-bold">
          Customer Details
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Phone Number (Search)</label>
            <div class="input-group">
              <input
                type="text"
                class="form-control"
                ng-model="customer.phone"
                placeholder="Enter phone..."
              />
              <button
                class="btn btn-info"
                type="button"
                ng-click="findCustomer()"
              >
                <i class="bi bi-search"></i> Search
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Customer Name</label>
            <input
              type="text"
              class="form-control"
              ng-model="customer.name"
              ng-disabled="customerFound && !canEditName"
              placeholder="Full Name"
            />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input
              type="email"
              class="form-control"
              ng-model="customer.email"
              ng-disabled="customerFound && !canEditEmail"
              placeholder="example@mail.com"
            />
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Physical Address</label>
            <textarea
              class="form-control"
              ng-model="customer.address"
              ng-disabled="customerFound && !canEditAddress"
              placeholder="Home or work address..."
            ></textarea>
          </div>

          <div class="alert alert-info py-2" ng-if="customerFound">
            <small
              ><i class="bi bi-info-circle me-1"></i> Existing customer. Missing
              fields can be updated.</small
            >
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header fw-bold">Order Summary</div>
        <table class="table table-hover">
          <tr ng-repeat="item in cart">
            <td class="ps-3">{{item.name}} x {{item.quantity}}</td>
            <td class="text-end pe-3">
              {{ (item.price * item.quantity) | currency }}
            </td>
          </tr>
          <tr class="table-active fw-bold">
            <td class="ps-3">Total Amount</td>
            <td class="text-end pe-3 text-primary" style="font-size: 1.2rem">
              {{ totalAmount | currency }}
            </td>
          </tr>
        </table>
        <div class="card-body">
          <button
            class="btn btn-success btn-lg w-100"
            ng-click="processOrder()"
            ng-disabled="!customer.name || cart.length === 0 || processing"
          >
            <i class="bi bi-check-circle me-2"></i>
            {{ processing ? 'Processing...' : 'Complete Sale' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
